name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older in-flight runs of the same branch/PR — saves minutes and keeps
# the most recent commit's status authoritative.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  ai-engine:
    name: AI Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-engine/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vopro
          POSTGRES_PASSWORD: vopro
          POSTGRES_DB: vopro_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://vopro:vopro@localhost:5432/vopro_test
      REDIS_URL: redis://localhost:6379/0
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: backend
      - run: bundle exec rubocop --parallel || true
      - run: bin/rails db:create db:migrate
      - run: bundle exec rspec

  agent:
    name: Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  integrations:
    name: Integrations (connectors)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: integrations/package-lock.json
      - run: npm ci || npm install --no-package-lock
      - run: npm test --if-present
      - run: npm run build

  # Fan-in job that the branch protection rule should require. Failures in any
  # individual job above will cause this to fail too, so a single check name
  # covers the whole matrix without listing every job manually.
  ci:
    name: CI
    needs: [frontend, ai-engine, backend, agent, integrations]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs succeeded."
