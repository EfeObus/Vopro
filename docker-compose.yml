services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vopro
      POSTGRES_PASSWORD: vopro
      POSTGRES_DB: vopro_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vopro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    command: bin/rails server -b 0.0.0.0 -p 3000
    environment:
      DATABASE_URL: postgres://vopro:vopro@postgres:5432/vopro_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      AI_ENGINE_URL: http://ai-engine:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  sidekiq:
    build:
      context: ./backend
    command: bundle exec sidekiq
    environment:
      DATABASE_URL: postgres://vopro:vopro@postgres:5432/vopro_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      AI_ENGINE_URL: http://ai-engine:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  ai-engine:
    build:
      context: ./ai-engine
    command: uvicorn vopro_ai.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOPRO_LLM_PROVIDER: ${VOPRO_LLM_PROVIDER:-deterministic}
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine:/app

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
