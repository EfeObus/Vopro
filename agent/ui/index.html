<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vopro Agent</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; background:#0c0f1f; color:#eef0f4; }
      h1 { font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; color: #b9c1d1; margin: 0 0 12px; }
      .card { background:#161a2c; border:1px solid #22273a; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
      .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
      .pill { font-size: 11px; padding: 3px 8px; border-radius: 999px; }
      .on { background:#0f3a2a; color:#86efac; }
      .off { background:#3a1a1a; color:#fda4af; }
      button { background:#4a64f5; color:#fff; border:none; border-radius: 8px; padding: 8px 12px; font-weight:500; cursor:pointer; }
      .ghost { background: transparent; color:#b9c1d1; border:1px solid #22273a; }
      .small { font-size: 12px; color:#7e889e; }
    </style>
  </head>
  <body>
    <h1>Vopro Agent</h1>
    <div class="card">
      <div class="row">
        <div>
          <div>Capture</div>
          <div class="small" id="device">device …</div>
        </div>
        <span id="pill" class="pill off">Paused</span>
      </div>
      <div class="row" style="margin-top:12px">
        <button id="toggle">Resume capture</button>
        <button id="flush" class="ghost">Sync now</button>
      </div>
    </div>
    <div class="card">
      <div class="small">All events are masked on this device before they leave.</div>
    </div>
    <script>
      const $ = (id) => document.getElementById(id);
      async function refresh() {
        const s = await window.vopro.status();
        $('device').textContent = `device ${s.deviceId.slice(0, 8)}`;
        $('pill').className = 'pill ' + (s.captureEnabled ? 'on' : 'off');
        $('pill').textContent = s.captureEnabled ? 'Active' : 'Paused';
        $('toggle').textContent = s.captureEnabled ? 'Pause capture' : 'Resume capture';
      }
      $('toggle').onclick = async () => {
        const s = await window.vopro.status();
        await window.vopro.setCapture(!s.captureEnabled);
        refresh();
      };
      $('flush').onclick = () => window.vopro.flush();
      refresh();
    </script>
  </body>
</html>
