<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vopro Capture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 14px;
        width: 320px;
        color: #1f2333;
        background: #fff;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 10px;
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #4a5163;
        margin: 10px 0 4px;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-size: 12px;
        padding: 6px 8px;
        border: 1px solid #d8dce6;
        border-radius: 6px;
        font-family: inherit;
      }
      textarea {
        height: 60px;
        resize: vertical;
      }
      button {
        font-size: 12px;
        font-weight: 600;
        padding: 7px 10px;
        border-radius: 6px;
        border: 1px solid #4a64f5;
        background: #4a64f5;
        color: #fff;
        cursor: pointer;
        margin-top: 10px;
      }
      .status {
        font-size: 11px;
        color: #6e7689;
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        background: #f5f6fa;
      }
      .ok {
        color: #16a34a;
      }
      .err {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>Vopro Capture</h1>

    <label for="receiver">Local agent URL</label>
    <input id="receiver" type="text" placeholder="http://127.0.0.1:17654" />

    <label for="token">Pairing token</label>
    <input id="token" type="password" placeholder="paste from agent tray menu" />

    <label for="domains">Opted-in domains (one per line)</label>
    <textarea id="domains" placeholder="app.salesforce.com&#10;trello.com"></textarea>

    <button id="save">Save</button>
    <button id="test" style="background:#fff;color:#4a64f5;margin-left:6px">Test connection</button>

    <div id="status" class="status">Loading…</div>

    <script src="popup.js"></script>
  </body>
</html>
